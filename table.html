<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>3D Table Fan — Three.js</title>
  <style>
    html,body { height:100%; margin:0; }
    #canvas { width:100%; height:100vh; display:block; }
    .ui { position: absolute; top: 10px; left: 10px; background: rgba(255,255,255,0.85); padding: 8px 10px; border-radius: 8px; font-family: sans-serif; }
    .ui label{display:flex; gap:8px; align-items:center}
  </style>
</head>
<body>
  <div id="container"></div>
  <div class="ui">
    <label>Speed: <input id="speed" type="range" min="0" max="1.5" step="0.01" value="0.6"></label>
    <label><input id="toggleSpin" type="checkbox" checked> Spin</label>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.152.2/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.152.2/examples/jsm/controls/OrbitControls.js';

    // Scene + camera + renderer
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xeceff1);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(4, 3, 6);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.getElementById('container').appendChild(renderer.domElement);

    // Controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // Lights
    const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 0.7);
    hemi.position.set(0, 50, 0);
    scene.add(hemi);

    const dir = new THREE.DirectionalLight(0xffffff, 0.8);
    dir.position.set(5, 10, 7);
    dir.castShadow = true;
    dir.shadow.mapSize.set(1024,1024);
    scene.add(dir);

    // Floor
    const floorGeo = new THREE.PlaneGeometry(20,20);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0xffffff, metalness:0.1, roughness:0.9 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI/2;
    floor.position.y = -1.05;
    floor.receiveShadow = true;
    scene.add(floor);

    // Table fan components
    const fan = new THREE.Group();

    // Base
    const baseGeo = new THREE.CylinderGeometry(0.8, 1.0, 0.4, 32);
    const baseMat = new THREE.MeshStandardMaterial({ color: 0x263238, metalness:0.6, roughness:0.4 });
    const base = new THREE.Mesh(baseGeo, baseMat);
    base.castShadow = true;
    base.position.y = -0.8;
    fan.add(base);

    // Stand
    const standGeo = new THREE.CylinderGeometry(0.07,0.07,1.2,16);
    const standMat = new THREE.MeshStandardMaterial({ color: 0x37474f, metalness:0.5, roughness:0.5 });
    const stand = new THREE.Mesh(standGeo, standMat);
    stand.position.y = -0.2;
    stand.castShadow = true;
    fan.add(stand);

    // Motor housing
    const motorGeo = new THREE.CylinderGeometry(0.4,0.45,0.6,32);
    const motorMat = new THREE.MeshStandardMaterial({ color: 0x455a64, metalness:0.6, roughness:0.3 });
    const motor = new THREE.Mesh(motorGeo, motorMat);
    motor.rotation.z = Math.PI/2;
    motor.position.set(0.6, 0.3, 0);
    motor.castShadow = true;
    fan.add(motor);

    // Blade hub (center)
    const hubGeo = new THREE.CylinderGeometry(0.08,0.08,0.2,24);
    const hub = new THREE.Mesh(hubGeo, new THREE.MeshStandardMaterial({ color:0x263238 }));
    hub.rotation.z = Math.PI/2;
    hub.position.set(0.95, 0.3, 0);
    hub.castShadow = true;
    fan.add(hub);

    // Blades group (rotate this)
    const bladesGroup = new THREE.Group();
    bladesGroup.position.set(0.95, 0.3, 0);

    const bladeMat = new THREE.MeshStandardMaterial({ color: 0x90a4ae, metalness:0.2, roughness:0.5 });

    const bladeCount = 3; // change to 3 or 4
    const bladeLength = 1.0;
    for(let i=0;i<bladeCount;i++){
      const b = new THREE.BoxGeometry(bladeLength, 0.08, 0.18);
      const blade = new THREE.Mesh(b, bladeMat);
      blade.castShadow = true;
      blade.position.x = bladeLength/2 + 0.05; // pivot placed at hub
      blade.rotation.y = 0;
      blade.rotation.z = (i / bladeCount) * Math.PI * 2;
      bladesGroup.add(blade);
    }

    fan.add(bladesGroup);

    // Protective cage (simple wireframe ring + cross bars)
    const cage = new THREE.Group();
    const ringGeo = new THREE.TorusGeometry(1.05, 0.03, 8, 100);
    const ringMat = new THREE.MeshStandardMaterial({ color:0x90a4ae, metalness:0.5, roughness:0.4 });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.y = Math.PI/2;
    ring.position.set(0.95, 0.3, 0);
    ring.castShadow = true;
    cage.add(ring);

    // cross bars
    for(let i=0;i<6;i++){
      const barGeo = new THREE.BoxGeometry(0.02, 0.02, 1.2);
      const bar = new THREE.Mesh(barGeo, ringMat);
      bar.rotation.y = Math.PI/2;
      bar.rotation.z = (i/6) * Math.PI * 2;
      bar.position.set(0.95, 0.3, 0);
      cage.add(bar);
    }
    scene.add(fan);
    scene.add(cage);

    // small details: tilt
    fan.rotation.z = -0.15; // tilt a bit

    // Helpers (optional)
    // const axes = new THREE.AxesHelper(2); scene.add(axes);

    // UI elements
    const speedEl = document.getElementById('speed');
    const toggleEl = document.getElementById('toggleSpin');

    // Animation
    let last = performance.now();
    function animate(now){
      const dt = (now - last) / 1000; last = now;

      if(toggleEl.checked){
        const speed = parseFloat(speedEl.value);
        // rotate around X axis so blades spin like a real fan
        bladesGroup.rotation.x -= speed * dt * 8.0; // tweak multiplier for feel
      }

      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);

    // Resize
    window.addEventListener('resize', ()=>{
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

  </script>
</body>
